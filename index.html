<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1a2e;--ink2:#4a4a6a;--ink3:#9898b8;--bg:#f7f6f2;--wh:#fff;--gold:#c9a84c;--gol:#f0e4c0;--gof:#faf5e8;--red:#c94c4c;--rel:#fce8e8;--grn:#3d9970;--grl:#e8f5ef;--blu:#3a7bd5;--bll:#e8f0fc;--bdr:#e5e3dc;--r:10px;--r2:14px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;min-height:100vh}
header{background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.hb{display:flex;align-items:center;gap:10px}
.hl{width:34px;height:34px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:600;font-size:15px;color:var(--ink)}
.ht{font-family:'Playfair Display',serif;font-size:18px;font-weight:600}
.hs{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.hr{display:flex;align-items:center;gap:14px}
.hd{font-size:11px;color:var(--ink3);text-align:right;line-height:1.6}
.hd strong{color:var(--gold);font-size:15px}
.sw{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:8px;background:rgba(255,255,255,.08)}
.sd{width:7px;height:7px;border-radius:50%;background:var(--grn);flex-shrink:0;transition:background .3s}
.sd.s{background:var(--gold);animation:pu 1s infinite}.sd.e{background:var(--red)}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.sl{font-size:11px;color:rgba(255,255,255,.6)}
nav{background:var(--wh);border-bottom:1px solid var(--bdr);display:flex;overflow-x:auto;padding:0 16px}
.nt{padding:0 16px;height:44px;border:none;background:transparent;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--ink2);border-bottom:2.5px solid transparent;white-space:nowrap}
.nt.on{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
main{max-width:1180px;margin:0 auto;padding:24px 16px}
.tab{display:none}.tab.on{display:block}
.ph{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.pt{font-family:'Playfair Display',serif;font-size:22px;font-weight:600}
.pd{font-size:12px;color:var(--ink2);margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--wh);cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--ink);white-space:nowrap}
.btn.g{background:var(--gold);color:var(--ink);border-color:var(--gold)}
.btn.d{color:var(--red);border-color:#f0c0c0;background:var(--rel)}
.btn.s{color:var(--grn);border-color:#b0ddc8;background:var(--grl)}
.btn.p{color:var(--blu);border-color:#c0d8f8;background:var(--bll)}
.btn.sm{padding:4px 9px;font-size:11px}.btn.xs{padding:3px 7px;font-size:11px;border-radius:7px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.sc{background:var(--wh);border:1px solid var(--bdr);border-radius:var(--r2);padding:14px 16px;text-align:center}
.sv{font-family:'Playfair Display',serif;font-size:24px;font-weight:600}

.dg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
input,select,textarea{width:100%;padding:8px 11px;border:1.5px solid var(--bdr);border-radius:var(--r);font-family:'Inter',sans-serif;font-size:12px;color:var(--ink);background:var(--wh);outline:none}

textarea{resize:vertical;min-height:58px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.fg{margin-bottom:11px}

.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;text-transform:uppercase;color:var(--ink3);background:var(--bg);border-bottom:1px solid var(--bdr)}
td{padding:9px 12px;border-bottom:1px solid var(--bdr);font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--gof)}
.fbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.fc{padding:3px 10px;border-radius:12px;border:1px solid var(--bdr);background:var(--wh);cursor:pointer;font-size:11px;color:var(--ink2)}
.fc.on{background:var(--ink);border-color:var(--ink);color:#fff}
.atabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--bdr);margin-bottom:14px}
.at{padding:8px 15px;border:none;background:transparent;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--ink2);border-bottom:3px solid transparent;white-space:nowrap}
.at.on{font-weight:600}
.ri{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r2);padding:14px 16px;margin-bottom:14px;border-left:4px solid var(--gold)}
.empty{text-align:center;padding:40px;color:var(--ink3)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:10px 16px;border-radius:var(--r2);font-size:12px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:680px){.dg{grid-template-columns:1fr}.fr2{grid-template-columns:1fr}main{padding:16px 10px}header{padding:0 12px}.hd{display:none}}

</style>

<script>
// Nav tabs — no onclick needed, use event delegation
document.querySelectorAll('.nt').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nt').forEach(b => b.classList.remove('on'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    btn.classList.add('on');
    const tab = document.getElementById('tab-' + btn.dataset.tab);
    if(tab) tab.classList.add('on');
    APP.tab = btn.dataset.tab;
    APP.render();
  });
});
</script>

window.APP = {

let db, dref, stimer;

function buildEmpty(){
  const d={envois:[],retours:{},collections:{}};
  AGENTS.forEach(a=>{d.retours[a.id]=[];d.collections[a.id]=MASTER.map(p=>({...p,addedAt:'2025-01-01'}));});
  return d;
}

function sync(state,label){
  const d=document.getElementById('sd'), l=document.getElementById('sl');
  if(!d) return;
  d.className='sd'+(state=='ok'?'':state=='s'?' s':' e');
  l.textContent=label||{ok:'Synchronise',s:'Sauvegarde...',e:'Erreur sync'}[state]||'';
}

// Firebase
try{
  const app=initializeApp(FBC);
  db=getDatabase(app);
  dref=ref(db,'crm/data');
  onValue(dref,snap=>{
    if(snap.exists()){
      const r=snap.val();
      if(r.envois) APP.data.envois=r.envois;
      if(r.facturation) APP.data.facturation=r.facturation;
      AGENTS.forEach(a=>{
        if(r.retours?.[a.id]) APP.data.retours[a.id]=r.retours[a.id];
        else if(!APP.data.retours[a.id]) APP.data.retours[a.id]=[];
        if(r.collections?.[a.id]) APP.data.collections[a.id]=r.collections[a.id];
        else if(!APP.data.collections[a.id]){APP.data.collections[a.id]=MASTER.map(p=>({...p,addedAt:'2025-01-01'}));save();}
      });
    } else {
      APP.data=buildEmpty();
      set(dref,APP.data);
    }
    sync('ok');
    if(!APP.ready){APP.ready=true;renderAll();}
    else APP.render();
  },err=>{sync('e','Erreur: '+err.code);APP.data=buildEmpty();APP.ready=true;renderAll();});
}catch(e){sync('e','Erreur init');APP.data=buildEmpty();APP.ready=true;renderAll();}

function save(){
  clearTimeout(stimer);
  stimer=setTimeout(async()=>{
    if(!dref)return;
    sync('s');
    try{await set(dref,APP.data);sync('ok');}
    catch(e){sync('e','Erreur sync');}
  },600);
}

const qs=s=>document.querySelector(s);
const qsa=s=>[...document.querySelectorAll(s)];
const toast=msg=>{const t=qs('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);};
const catPill=c=>{const k=c==='LAST CHANCE'?'LAST':c;return `<span class="cp c${k}">${c}</span>`;};

function injectEF(mods,cols){
  const z=qs('#efz');if(!z)return;
  const e=APP.eid?APP.data.envois.find(x=>x.id===APP.eid):null;
  const aBtns=AGENTS.map(a=>`<button type="button" class="fc${e&&e.agents.includes(a.id)?' on':''}" data-aid="${a.id}">${a.name}<br><small style="opacity:.6;font-size:10px">${a.region}</small></button>`).join('');
  const mOpts=mods.map(m=>`<option value="${m}">`).join('');
  const cOpts=cols.map(c=>`<option value="${c}">`).join('');
  z.innerHTML=`<div class="card" style="margin-bottom:14px;padding:16px">
    <div style="font-size:15px;font-weight:600;margin-bottom:12px">${e?'Modifier envoi':'Nouvel envoi'}</div>
    <div class="fg"><label class="fl">Agent(s) *</label><div style="display:flex;flex-wrap:wrap;gap:6px" id="agPicker">${aBtns}</div></div>
    <div class="fr2">
      <div class="fg"><label class="fl">Modele *</label><input list="eml" id="ef_m" value="${e?e.modele:''}" placeholder="ex: Goku"><datalist id="eml">${mOpts}</datalist></div>
      <div class="fg"><label class="fl">Couleur *</label><input list="ecl" id="ef_c" value="${e?e.couleur||'':''}" placeholder="ex: Storm"><datalist id="ecl">${cOpts}</datalist></div>
    </div>
    <div class="fr2">
      <div class="fg"><label class="fl">Nb pieces *</label><input type="number" id="ef_p" min="1" value="${e?e.pieces:''}" placeholder="3"></div>
      <div class="fg"><label class="fl">Date *</label><input type="date" id="ef_d" value="${e?e.date:today()}"></div>
    </div>
    <div class="fg"><label class="fl">Notes</label><textarea id="ef_n">${e?e.notes||'':''}</textarea></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn g sm" id="btnSaveE">Enregistrer</button>
      <button class="btn sm" id="btnCancelE">Annuler</button>
    </div>
  </div>`;
  qs('#agPicker')?.addEventListener('click',e=>{if(e.target.dataset.aid)e.target.classList.toggle('on');});
  qs('#btnCancelE')?.addEventListener('click',()=>{APP.eopen=false;APP.eid=null;renderEnvois();});
  qs('#btnSaveE')?.addEventListener('click',async()=>{
    const agents=qsa('#agPicker .fc.on').map(b=>b.dataset.aid);
    const modele=qs('#ef_m')?.value.trim();
    const couleur=qs('#ef_c')?.value.trim();
    const pieces=parseInt(qs('#ef_p')?.value)||0;
    const date=qs('#ef_d')?.value;
    const notes=qs('#ef_n')?.value.trim();
    if(!agents.length){toast('Selectionnez un agent');return;}
    if(!modele){toast('Modele obligatoire');return;}
    if(pieces<1){toast('Nb pieces obligatoire');return;}
    if(!date){toast('Date obligatoire');return;}
    if(APP.eid){
      const idx=APP.data.envois.findIndex(x=>x.id===APP.eid);
      if(idx>=0)APP.data.envois[idx]={...APP.data.envois[idx],agents,modele,couleur,pieces,date,notes};
    } else {
      APP.data.envois.push({id:uid(),agents,modele,couleur,pieces,date,notes});
      for(const aid of agents){
        let prod=MASTER.find(p=>p.nom.toLowerCase()===(modele+(couleur?' '+couleur:'')).toLowerCase());
        if(!prod)prod={id:uid(),nom:modele+(couleur?' '+couleur:''),modele,couleur,categorie:'ICONIC'};
        if(!APP.data.collections[aid])APP.data.collections[aid]=[];
        if(!APP.data.collections[aid].find(p=>p.id===prod.id))APP.data.collections[aid].push({...prod,addedAt:date||today()});
      }
    }
    APP.eopen=false;APP.eid=null;
    save();toast('Envoi enregistre');renderEnvois();renderDash();renderColl();
  });
}

  const aTabs=AGENTS.map(a=>`<button class="at${a.id===aid?' on':''}" data-agent="${a.id}" data-type="ret" style="${a.id===aid?'border-bottom-color:'+a.color+';color:'+a.color:''}">${a.name}</button>`).join('');
  const fChips=['all','attente','recu','non_recu'].map((v,i)=>`<span class="fc${APP.rf===v?' on':''}" data-rf="${v}">${['Tous','En attente','Recu','Non recu'][i]}</span>`).join('');
  const mOpts=mods.map(m=>`<option value="${m}">`).join('');
  let editHtml='';
  if(APP.red&&APP.red.aid===aid){
    const r=APP.red;
    editHtml=`<div class="ri" style="border-left-color:${agent.color}">
      <div style="font-size:12px;font-weight:600;margin-bottom:10px;color:${agent.color}">Modifier le retour</div>
      <div class="fr2">
        <div class="fg"><label class="fl">Modele</label><input list="re_ml" id="re_m" value="${r.modele||''}"><datalist id="re_ml">${mOpts}</datalist></div>
        <div class="fg"><label class="fl">Couleur</label><input id="re_c" value="${r.couleur||''}"></div>
      </div>
      <div class="fr2">
        <div class="fg"><label class="fl">Date</label><input type="date" id="re_d" value="${r.date_demande||today()}"></div>
        <div class="fg"><label class="fl">Statut</label><select id="re_s">
          <option value="attente"${(r.statut||'attente')==='attente'?' selected':''}>En attente</option>
          <option value="recu"${r.statut==='recu'?' selected':''}>Recu</option>
          <option value="non_recu"${r.statut==='non_recu'?' selected':''}>Non recu</option>
        </select></div>
      </div>
      <div class="fr2">
        <div class="fg"><label class="fl">Date reception</label><input type="date" id="re_r" value="${r.date_reception||''}"></div>
        <div class="fg"><label class="fl">Notes</label><input id="re_n" value="${r.notes||''}"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn g sm" id="btnSaveRE">Enregistrer</button>
        <button class="btn sm" id="btnCancelRE">Annuler</button>
      </div>
    </div>`;
  }
  let newHtml='';
  if(APP.rnew&&APP.rnaid===aid){
    newHtml=`<div class="ri" style="border-left-color:${agent.color}">
      <div style="font-size:12px;font-weight:600;margin-bottom:10px;color:${agent.color}">Nouvelle demande - ${agent.name}</div>
      <div class="fr2">
        <div class="fg"><label class="fl">Modele *</label><input list="rn_ml" id="rn_m" placeholder="ex: Goku"><datalist id="rn_ml">${mOpts}</datalist></div>
        <div class="fg"><label class="fl">Couleur</label><input id="rn_c" placeholder="ex: Storm"></div>
      </div>
      <div class="fr2">
        <div class="fg"><label class="fl">Date</label><input type="date" id="rn_d" value="${today()}"></div>
        <div class="fg"><label class="fl">Statut</label><select id="rn_s">
          <option value="attente">En attente</option>
          <option value="recu">Recu</option>
          <option value="non_recu">Non recu</option>
        </select></div>
      </div>
      <div class="fg"><label class="fl">Notes</label><textarea id="rn_n"></textarea></div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn g sm" id="btnSaveRN">Enregistrer</button>
        <button class="btn sm" id="btnCancelRN">Annuler</button>
      </div>
    </div>`;
  }
  const rows=data.length?data.map(r=>{
    const sb=r.statut==='attente'?'<span class="badge bb">En attente</span>':r.statut==='recu'?'<span class="badge bg">Recu</span>':'<span class="badge br">Non recu</span>';
    return `<tr>
      <td>${fd(r.date_demande)}</td><td><strong>${r.modele}</strong></td><td>${r.couleur||'-'}</td>
      <td>${sb}</td><td>${r.date_reception?fd(r.date_reception):'-'}</td>
      <td style="color:var(--ink3);max-width:110px;font-size:11px">${r.notes||'-'}</td>
      <td class="np" style="white-space:nowrap">
        <button class="btn xs s" data-mark-recu="${r.id}">Recu</button>
        <button class="btn xs" data-edit-ret="${r.id}">Editer</button>
        <button class="btn xs d" data-del-ret="${r.id}">Suppr</button>
      </td></tr>`;
  }).join(''):'<tr><td colspan="7" class="empty">Aucune demande.</td></tr>';
  el.innerHTML=`
  <div class="ph"><div><div class="pt">Retours</div><div class="pd">Par agent</div></div>
  <button class="btn p sm np" id="btnPR">Imprimer</button></div>
  <div class="atabs" id="retAgTabs">${aTabs}</div>
  ${editHtml}${newHtml}
  <div class="fbar" id="retFbar">${fChips}</div>
  <div class="card"><div class="chdr">
    <input style="width:190px;font-size:12px" placeholder="Rechercher..." id="retSrch" value="${APP.rs[aid]||''}">
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:11px;color:var(--ink3)">${data.length} resultat(s)</span>
      <button class="btn g sm np" id="btnNR">+ Nouvelle demande</button>
    </div>
  </div>
  <div class="twrap"><table>
    <thead><tr><th>Date</th><th>Modele</th><th>Couleur</th><th>Statut</th><th>Reception</th><th>Notes</th><th class="np"></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div></div>`;
  // events
  qs('#btnPR')?.addEventListener('click',()=>doPrint('retours_'+aid));
  qs('#btnNR')?.addEventListener('click',()=>{APP.rnew=true;APP.rnaid=aid;APP.red=null;renderRetours();});
  qs('#retSrch')?.addEventListener('input',e=>{APP.rs[aid]=e.target.value;renderRetours();});
  qs('#retAgTabs')?.addEventListener('click',e=>{
    const btn=e.target.closest('[data-agent]');
    if(btn){APP.aid=btn.dataset.agent;APP.red=null;APP.rnew=false;renderRetours();}
  });
  qs('#retFbar')?.addEventListener('click',e=>{const rf=e.target.dataset.rf;if(rf){APP.rf=rf;renderRetours();}});
  qsa('[data-mark-recu]').forEach(b=>b.addEventListener('click',()=>{
    const r=(APP.data.retours[aid]||[]).find(x=>x.id===b.dataset.markRecu);if(!r)return;
    r.statut='recu';r.date_reception=r.date_reception||today();
    rmColl(aid,r.modele,r.couleur);save();toast(r.modele+' recu');renderRetours();renderDash();renderColl();
  }));
  qsa('[data-edit-ret]').forEach(b=>b.addEventListener('click',()=>{
    const r=(APP.data.retours[aid]||[]).find(x=>x.id===b.dataset.editRet);if(!r)return;
    APP.red={...r,aid};APP.rnew=false;renderRetours();
  }));
  qsa('[data-del-ret]').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm('Supprimer ?'))return;
    APP.data.retours[aid]=(APP.data.retours[aid]||[]).filter(r=>r.id!==b.dataset.delRet);
    save();toast('Supprime');renderRetours();renderDash();
  }));
  qs('#btnCancelRE')?.addEventListener('click',()=>{APP.red=null;renderRetours();});
  qs('#btnSaveRE')?.addEventListener('click',()=>{
    const r=APP.red;
    const idx=(APP.data.retours[aid]||[]).findIndex(x=>x.id===r.id);if(idx<0)return;
    const ns=qs('#re_s')?.value||r.statut;
    const upd={...APP.data.retours[aid][idx],modele:qs('#re_m')?.value.trim()||r.modele,couleur:qs('#re_c')?.value.trim()||'',date_demande:qs('#re_d')?.value||r.date_demande,statut:ns,date_reception:qs('#re_r')?.value||'',notes:qs('#re_n')?.value.trim()||''};
    if(ns==='recu'&&r.statut!=='recu'){rmColl(aid,upd.modele,upd.couleur);toast('Recu - retire');}
    APP.data.retours[aid][idx]=upd;APP.red=null;save();renderRetours();renderDash();renderColl();
  });
  qs('#btnCancelRN')?.addEventListener('click',()=>{APP.rnew=false;renderRetours();});
  qs('#btnSaveRN')?.addEventListener('click',()=>{
    const modele=qs('#rn_m')?.value.trim();
    if(!modele){toast('Modele obligatoire');return;}
    const couleur=qs('#rn_c')?.value.trim()||'';
    const date=qs('#rn_d')?.value||today();
    const statut=qs('#rn_s')?.value||'attente';
    const notes=qs('#rn_n')?.value.trim()||'';
    if(!APP.data.retours[aid])APP.data.retours[aid]=[];
    APP.data.retours[aid].push({id:uid(),modele,couleur,statut,date_demande:date,date_reception:statut==='recu'?today():'',notes});
    if(statut==='recu')rmColl(aid,modele,couleur);
    APP.rnew=false;save();toast('Retour enregistre');renderRetours();renderDash();renderColl();
  });
}

function rmColl(aid,modele,couleur){
  const nm=modele.toLowerCase()+'_'+(couleur||'').toLowerCase();
  APP.data.collections[aid]=(APP.data.collections[aid]||[]).filter(p=>(p.modele.toLowerCase()+'_'+(p.couleur||'').toLowerCase())!==nm);
}

// --- COLLECTIONS ---
function renderColl(){
  const el=qs('#tab-collections');if(!el)return;
  const aid=APP.aid,agent=byId(aid);
  const coll=[...(APP.data.collections[aid]||[])];
  const srch=(APP.cs[aid]||'').toLowerCase();
  const cat=APP.cc[aid]||'';
  let filt=coll.filter(p=>(!srch||(p.modele+' '+p.couleur).toLowerCase().includes(srch))&&(!cat||p.categorie===cat));
  filt.sort((a,b)=>a.modele.localeCompare(b.modele)||(a.couleur||'').localeCompare(b.couleur||''));
  const rf=APP.forms[aid]||{};
  const aTabs=AGENTS.map(a=>`<button class="at${a.id===aid?' on':''}" data-agent="${a.id}" data-type="coll" style="${a.id===aid?'border-bottom-color:'+a.color+';color:'+a.color:''}">${a.name} <span style="font-size:11px;opacity:.6">(${(APP.data.collections[a.id]||[]).length})</span></button>`).join('');
  const catOpts=['ICONIC','LAST CHANCE','ORIGIN','STUDIO','COLLAB','GOODIES'].map(c=>`<option value="${c}"${cat===c?' selected':''}>${c}</option>`).join('');
  const mastOpts=MASTER.filter(p=>!coll.find(x=>x.id===p.id)).map(p=>`<option value="${p.nom}">`).join('');
  let rfHtml='';
  if(rf.open){
    rfHtml=`<div class="ri" style="border-left-color:${agent.color}">
      <div style="font-size:12px;font-weight:600;margin-bottom:10px;color:${agent.color}">Retour - ${rf.modele}${rf.couleur?' - '+rf.couleur:''}</div>
      <div class="fr2">
        <div class="fg"><label class="fl">Date demande</label><input type="date" id="rf_d" value="${today()}"></div>
        <div class="fg"><label class="fl">Statut</label><select id="rf_s">
          <option value="attente">En attente</option>
          <option value="recu">Recu</option>
          <option value="non_recu">Non recu</option>
        </select></div>
      </div>
      <div class="fr2">
        <div class="fg"><label class="fl">Date reception</label><input type="date" id="rf_r"></div>
        <div class="fg"><label class="fl">Notes</label><input id="rf_n" placeholder="Facultatif"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn g sm" id="btnSaveRF">Enregistrer</button>
        <button class="btn sm" id="btnCancelRF">Annuler</button>
      </div>
    </div>`;
  }
  const rows=filt.length?filt.map(p=>`<tr>
    <td><strong>${p.modele}</strong></td><td>${p.couleur||'-'}</td>
    <td>${catPill(p.categorie)}</td>
    <td style="color:var(--ink3);font-size:11px">${fd(p.addedAt)}</td>
    <td class="np" style="white-space:nowrap">
      <button class="btn xs" style="color:var(--gold);border-color:var(--gol);background:var(--gof)" data-open-ret="${p.id}">Retour</button>
      <button class="btn xs d" data-del-prod="${p.id}">Suppr</button>
    </td></tr>`).join(''):'<tr><td colspan="5" class="empty">Aucun modele.</td></tr>';
  el.innerHTML=`
  <div class="ph"><div><div class="pt">Collections</div><div class="pd">${agent.name} - ${filt.length} / ${coll.length} modeles</div></div>
  <button class="btn p sm np" id="btnPC">Imprimer</button></div>
  <div class="atabs" id="collAgTabs">${aTabs}</div>
  ${rfHtml}
  <div class="card"><div class="chdr" style="flex-wrap:wrap;gap:8px">
    <input style="width:180px;font-size:12px" placeholder="Rechercher..." id="collSrch" value="${APP.cs[aid]||''}">
    <select style="width:148px;font-size:12px" id="collCat">
      <option value="">Toutes categories</option>${catOpts}
    </select>
    <span style="font-size:11px;color:var(--ink3)">${filt.length} / ${coll.length}</span>
  </div>
  <div class="twrap"><table>
    <thead><tr><th>Modele</th><th>Couleur</th><th>Categorie</th><th>Ajoute le</th><th class="np" style="width:130px"></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
  <div style="padding:10px 14px;border-top:1px solid var(--bdr);display:flex;gap:8px;align-items:center;flex-wrap:wrap" class="np">
    <span style="font-size:12px;color:var(--ink2)">Ajouter :</span>
    <input list="mastList" id="addPI" style="flex:1;min-width:160px;font-size:12px" placeholder="Nom du produit...">
    <datalist id="mastList">${mastOpts}</datalist>
    <button class="btn s sm" id="btnAddP">+ Ajouter</button>
  </div></div>`;
  // events
  qs('#btnPC')?.addEventListener('click',()=>doPrint('coll_'+aid));
  qs('#collAgTabs')?.addEventListener('click',e=>{
    const btn=e.target.closest('[data-agent]');
    if(btn){APP.aid=btn.dataset.agent;APP.forms={};renderColl();}
  });
  qs('#collSrch')?.addEventListener('input',e=>{APP.cs[aid]=e.target.value;renderColl();});
  qs('#collCat')?.addEventListener('change',e=>{APP.cc[aid]=e.target.value;renderColl();});
  qsa('[data-open-ret]').forEach(b=>b.addEventListener('click',()=>{
    const p=coll.find(x=>x.id===b.dataset.openRet);if(!p)return;
    APP.forms[aid]={open:true,modele:p.modele,couleur:p.couleur||'',prodId:p.id};
    renderColl();setTimeout(()=>qs('#rf_d')?.focus(),50);
  }));
  qsa('[data-del-prod]').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm('Retirer ce modele ?'))return;
    APP.data.collections[aid]=coll.filter(p=>p.id!==b.dataset.delProd);
    save();toast('Retire');renderColl();renderDash();
  }));
  qs('#btnCancelRF')?.addEventListener('click',()=>{APP.forms[aid]=null;renderColl();});
  qs('#btnSaveRF')?.addEventListener('click',()=>{
    const r=APP.forms[aid];if(!r)return;
    const date=qs('#rf_d')?.value||today();
    const statut=qs('#rf_s')?.value||'attente';
    const drec=qs('#rf_r')?.value||'';
    const notes=qs('#rf_n')?.value||'';
    if(!APP.data.retours[aid])APP.data.retours[aid]=[];
    APP.data.retours[aid].push({id:uid(),modele:r.modele,couleur:r.couleur,statut,date_demande:date,date_reception:drec,notes});
    if(statut==='recu')APP.data.collections[aid]=coll.filter(p=>p.id!==r.prodId);
    APP.forms[aid]=null;save();toast('Retour enregistre'+(statut==='recu'?' (retire)':''));
    renderColl();renderRetours();renderDash();
  });
  qs('#btnAddP')?.addEventListener('click',()=>{
    const inp=qs('#addPI');if(!inp||!inp.value.trim())return;
    const val=inp.value.trim();
    const prod=MASTER.find(p=>p.nom.toLowerCase()===val.toLowerCase());
    if(!prod){toast('Produit introuvable');return;}
    if(coll.find(p=>p.id===prod.id)){toast('Deja dans la collection');return;}
    APP.data.collections[aid].push({...prod,addedAt:today()});
    save();inp.value='';toast(prod.nom+' ajoute');renderColl();
  });
}

// --- AGENTS ---
function renderAgents(){
  const el=qs('#tab-agents');if(!el)return;
  const cards=AGENTS.map(a=>{
    const nc=(APP.data.collections[a.id]||[]).length;
    const np=(APP.data.retours[a.id]||[]).filter(r=>r.statut==='attente').length;
    const nr=(APP.data.retours[a.id]||[]).filter(r=>r.statut==='recu').length;
    return `<div class="card" style="border-top:4px solid ${a.color}">
      <div style="display:flex;align-items:center;gap:12px;padding:16px 16px 12px">
        <div style="width:42px;height:42px;border-radius:50%;background:${a.color};display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:#fff">${a.name[0]}</div>
        <div><div style="font-weight:600;font-size:14px">${a.name}</div><div style="font-size:11px;color:var(--ink3)">${a.region}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 14px 14px">
        <div style="background:var(--gof);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--gold)">${nc}</div><div style="font-size:10px;color:var(--ink3);text-transform:uppercase">Modeles</div></div>
        <div style="background:var(--rel);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--red)">${np}</div><div style="font-size:10px;color:var(--ink3);text-transform:uppercase">Attente</div></div>
        <div style="background:var(--grl);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--grn)">${nr}</div><div style="font-size:10px;color:var(--ink3);text-transform:uppercase">Recus</div></div>
      </div>
      <div style="padding:0 14px 14px;display:flex;gap:8px">
        <button class="btn sm" style="flex:1" data-goto-coll="${a.id}">Collection</button>
        <button class="btn sm" style="flex:1" data-goto-ret="${a.id}">Retours</button>
      </div>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="ph"><div><div class="pt">Agents</div></div></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px">${cards}</div>`;
  qsa('[data-goto-coll]').forEach(b=>b.addEventListener('click',()=>{
    APP.aid=b.dataset.gotoColl;APP.forms={};
    qs('[data-tab="collections"]')?.click();
  }));
  qsa('[data-goto-ret]').forEach(b=>b.addEventListener('click',()=>{
    APP.aid=b.dataset.gotoRet;APP.red=null;APP.rnew=false;
    qs('[data-tab="retours"]')?.click();
  }));
}

// --- PRINT ---
function doPrint(type){
  const now=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  const css='<style>body{font-family:Arial,sans-serif;font-size:12px}table{width:100%;border-collapse:collapse}th{background:#1a1a2e;color:#fff;padding:7px 9px;text-align:left;font-size:11px}td{padding:6px 9px;border-bottom:1px solid #eee}.hd{text-align:center;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid #c9a84c}.hd h2{font-size:20px;color:#1a1a2e}.hd p{font-size:11px;color:#666}@page{margin:1.5cm}</style>';
  let body='';
  if(type==='envois'){
    const rows=APP.data.envois.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,50);
    body=`<div class="hd"><h2>Envois</h2><p>${now} - Eyes Gang CRM</p></div><table><thead><tr><th>Date</th><th>Modele</th><th>Couleur</th><th>Pieces</th><th>Agent(s)</th><th>Notes</th></tr></thead><tbody>${rows.map(e=>`<tr><td>${fd(e.date)}</td><td>${e.modele}</td><td>${e.couleur||'-'}</td><td>${e.pieces} pcs</td><td>${e.agents.map(id=>byId(id)?.name||id).join(', ')}</td><td>${e.notes||'-'}</td></tr>`).join('')}</tbody></table>`;
  } else if(type==='retours'){
    const rows=AGENTS.flatMap(a=>(APP.data.retours[a.id]||[]).map(r=>({...r,an:a.name}))).sort((a,b)=>(b.date_demande||'').localeCompare(a.date_demande||'')).slice(0,50);
    body=`<div class="hd"><h2>Retours</h2><p>${now} - Eyes Gang CRM</p></div><table><thead><tr><th>Date</th><th>Modele</th><th>Couleur</th><th>Agent</th><th>Statut</th><th>Reception</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${fd(r.date_demande)}</td><td>${r.modele}</td><td>${r.couleur||'-'}</td><td>${r.an}</td><td>${{attente:'En attente',recu:'Recu',non_recu:'Non recu'}[r.statut]}</td><td>${r.date_reception?fd(r.date_reception):'-'}</td></tr>`).join('')}</tbody></table>`;
  } else if(type.startsWith('retours_')){
    const aid=type.slice(8),a=byId(aid);
    const rows=(APP.data.retours[aid]||[]).slice().sort((a,b)=>(b.date_demande||'').localeCompare(a.date_demande||''));
    body=`<div class="hd"><h2>Retours - ${a?a.name:''}</h2><p>${now} - Eyes Gang CRM</p></div><table><thead><tr><th>Date</th><th>Modele</th><th>Couleur</th><th>Statut</th><th>Reception</th><th>Notes</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${fd(r.date_demande)}</td><td>${r.modele}</td><td>${r.couleur||'-'}</td><td>${{attente:'En attente',recu:'Recu',non_recu:'Non recu'}[r.statut]}</td><td>${r.date_reception?fd(r.date_reception):'-'}</td><td>${r.notes||'-'}</td></tr>`).join('')}</tbody></table>`;
  } else if(type.startsWith('coll_')){
    const aid=type.slice(5),a=byId(aid);
    const rows=(APP.data.collections[aid]||[]).slice().sort((x,y)=>x.modele.localeCompare(y.modele));
    body=`<div class="hd"><h2>Collection - ${a?a.name:''}</h2><p>${now} - ${rows.length} modeles</p></div><table><thead><tr><th>Modele</th><th>Couleur</th><th>Categorie</th><th>Ajoute le</th></tr></thead><tbody>${rows.map(p=>`<tr><td>${p.modele}</td><td>${p.couleur||'-'}</td><td>${p.categorie}</td><td>${fd(p.addedAt)}</td></tr>`).join('')}</tbody></table>`;
  }
  if(!body)return;
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Eyes Gang CRM</title>${css}</head><body>${body}</body></html>`);
  w.document.close();setTimeout(()=>{w.focus();w.print();},400);
}

// ===================== FACTURATION =====================
function renderFactu(){
  const el=qs('#tab-facturation'); if(!el) return;
  const now=new Date();
  const years=[...new Set(APP.data.facturation.map(f=>f.annee))].sort((a,b)=>b-a);
  if(!years.includes(now.getFullYear())) years.unshift(now.getFullYear());
  const selYear = APP.factuYear || now.getFullYear();
  APP.factuYear = selYear;
  const moisLabels=['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];

  function getEntry(agentId,mois,annee){
    return APP.data.facturation.find(f=>f.agent===agentId&&f.mois===mois&&f.annee===annee)||{agent:agentId,mois,annee,caht:0,fraisPort:0,autresFrais:0};
  }

  function calcCommission(agentId,mois,annee){
    const e=getEntry(agentId,mois,annee);
    const caht=parseFloat(e.caht)||0;
    const fp=parseFloat(e.fraisPort)||0;
    const af=parseFloat(e.autresFrais)||0;
    if(agentId==='leslie'){
      const eSami=getEntry('sami',mois,annee);
      const ePa=getEntry('pa',mois,annee);
      const cahSami=parseFloat(eSami.caht)||0;
      const cahPa=parseFloat(ePa.caht)||0;
      const fixe = mois===8 ? 0 : 1000;
      const comm=(caht*0.20)+fixe+(cahSami*0.02)+(cahPa*0.02)-fp-af;
      return {comm,caht,fp,af,cahSami,cahPa,fixe};
    } else {
      const comm=(caht*0.20)-fp-af;
      return {comm,caht,fp,af};
    }
  }

  function fmt(n){return n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2});}

  function buildAgentTable(agentId,agentName,color){
    const isLeslie=agentId==='leslie';
    let totalCA=0,totalComm=0;
    const rows=[];
    for(let m=1;m<=12;m++){
      const c=calcCommission(agentId,m,selYear);
      totalCA+=c.caht;
      totalComm+=c.comm;
      const commColor=c.comm>0?'var(--grn)':c.comm<0?'var(--red)':'var(--ink3)';
      const leslieCols=isLeslie?`
        <td style="text-align:right;color:var(--blu);font-size:13px;font-weight:500">${fmt(c.cahSami*0.02)} EUR</td>
        <td style="text-align:right;color:var(--grn);font-size:13px;font-weight:500">${fmt(c.cahPa*0.02)} EUR</td>`:'';
      rows.push(`<tr>
        <td style="font-weight:500;width:110px">${moisLabels[m-1]}${isLeslie&&m===8?' <span style="font-size:10px;color:var(--ink3)">(sans fixe)</span>':''}</td>
        <td><input class="fi-input" type="number" step="0.01" min="0"
          data-field="caht" data-agent="${agentId}" data-mois="${m}" data-annee="${selYear}"
          value="${c.caht||''}" placeholder="0.00"
          style="max-width:140px;text-align:right"></td>
        ${leslieCols}
        <td style="color:var(--ink3);font-size:12px">
          - <input class="fi-input" type="number" step="0.01" min="0"
            data-field="fraisPort" data-agent="${agentId}" data-mois="${m}" data-annee="${selYear}"
            value="${c.fp||''}" placeholder="Port"
            style="max-width:90px;text-align:right">
        </td>
        <td style="color:var(--ink3);font-size:12px">
          - <input class="fi-input" type="number" step="0.01" min="0"
            data-field="autresFrais" data-agent="${agentId}" data-mois="${m}" data-annee="${selYear}"
            value="${c.af||''}" placeholder="Autres"
            style="max-width:90px;text-align:right">
        </td>
        <td style="font-weight:700;color:${commColor};text-align:right;font-size:14px">${fmt(c.comm)} EUR</td>
      </tr>`);
    }
    const subtitle=isLeslie?'20% CA HT + 1 000 EUR/mois (sauf aout) + 2% CA Sami & PA':'20% CA HT';
    return `<div class="card" style="margin-bottom:24px;border-top:4px solid ${color}">
      <div class="chdr">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:34px;height:34px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:15px">${agentName[0]}</div>
          <div>
            <div style="font-weight:600;font-size:15px">${agentName}</div>
            <div style="font-size:11px;color:var(--ink3)">${subtitle}</div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--ink3)">CA HT ${selYear}</div>
          <div style="font-size:20px;font-weight:700;color:${color}">${fmt(totalCA)} EUR</div>
          <div style="font-size:11px;color:var(--ink3);margin-top:4px">Total commissions ${selYear}</div>
          <div style="font-size:20px;font-weight:700;color:${totalComm>=0?'var(--grn)':'var(--red)'}">${fmt(totalComm)} EUR</div>
        </div>
      </div>
      <div class="twrap"><table>
        <thead><tr>
          <th>Mois</th>
          <th>CA HT</th>
          ${isLeslie?'<th style="color:#3a7bd5">2% CA Sami</th><th style="color:#3d9970">2% CA PA</th>':''}
          <th>Frais de port</th>
          <th>Autres frais</th>
          <th style="text-align:right">Commission</th>
        </tr></thead>
        <tbody>${rows.join('')}</tbody>
        <tfoot><tr style="background:var(--bg);font-weight:700;border-top:2px solid var(--bdr)">
          <td>TOTAL ${selYear}</td>
          <td style="font-weight:700">${fmt(totalCA)} EUR</td>
          ${isLeslie?'<td colspan="2"></td>':''}
          <td colspan="2"></td>
          <td style="text-align:right;color:${totalComm>=0?'var(--grn)':'var(--red)'};font-size:15px">${fmt(totalComm)} EUR</td>
        </tr></tfoot>
      </table></div>
    </div>`;
  }

  const yearOpts=years.map(y=>`<option value="${y}"${y===selYear?' selected':''}>${y}</option>`).join('');

  el.innerHTML=`
  <div class="ph">
    <div><div class="pt">Facturation Agents</div><div class="pd">Simulateur de commissions</div></div>
    <div style="display:flex;gap:8px;align-items:center" class="np">
      <label style="font-size:12px;color:var(--ink2)">Annee :</label>
      <select id="yearSel" style="width:100px;font-size:13px">${yearOpts}</select>
      <button class="btn p sm" id="btnPrintFactu">Imprimer</button>
    </div>
  </div>
  <div style="font-size:13px;font-weight:600;margin-bottom:14px;color:var(--ink2);text-transform:uppercase;letter-spacing:.06em;padding-bottom:8px;border-bottom:1px solid var(--bdr)">France</div>
  ${buildAgentTable('leslie','Leslie','#c94c8e')}
  ${buildAgentTable('pa','Pierre Alexandre','#3d9970')}
  ${buildAgentTable('sami','Sami','#3a7bd5')}
  <div style="font-size:13px;font-weight:600;margin:8px 0 14px;color:var(--ink2);text-transform:uppercase;letter-spacing:.06em;padding-bottom:8px;border-bottom:1px solid var(--bdr)">Europe / International</div>
  ${buildAgentTable('velvet','Velvet','#c97a4c')}`;

  qs('#yearSel')?.addEventListener('change',e=>{APP.factuYear=parseInt(e.target.value);renderFactu();});
  qs('#btnPrintFactu')?.addEventListener('click',()=>printFactu(selYear));

  qsa('.fi-input').forEach(inp=>{
    inp.addEventListener('change',()=>{
      const {agent,mois,annee,field}=inp.dataset;
      const m=parseInt(mois),y=parseInt(annee),val=parseFloat(inp.value)||0;
      let entry=APP.data.facturation.find(f=>f.agent===agent&&f.mois===m&&f.annee===y);
      if(!entry){entry={id:uid(),agent,mois:m,annee:y,caht:0,fraisPort:0,autresFrais:0};APP.data.facturation.push(entry);}
      entry[field]=val;
      save();
      renderFactu();
    });
  });
}

function printFactu(year){
  const moisLabels=['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];
  const agentsF=[
    {id:'leslie',name:'Leslie',isLeslie:true},
    {id:'pa',name:'Pierre Alexandre',isLeslie:false},
    {id:'sami',name:'Sami',isLeslie:false},
    {id:'velvet',name:'Velvet',isLeslie:false},
  ];
  const css='<style>body{font-family:Arial,sans-serif;font-size:11px}h1{font-size:18px;color:#1a1a2e;margin-bottom:4px}h2{font-size:13px;color:#1a1a2e;margin:18px 0 8px;border-bottom:2px solid #c9a84c;padding-bottom:4px}table{width:100%;border-collapse:collapse;margin-bottom:8px}th{background:#1a1a2e;color:#fff;padding:6px 8px;text-align:left;font-size:10px}td{padding:5px 8px;border-bottom:1px solid #eee}td:last-child{text-align:right;font-weight:600}.tot{font-weight:700;background:#f5f5f5}.hd{margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #c9a84c}p{font-size:11px;color:#666}@page{margin:1.5cm}</style>';
  let body=`<div class="hd"><h1>Commissions ${year} - Eyes Gang</h1><p>Imprime le ${new Date().toLocaleDateString('fr-FR')}</p></div>`;
  agentsF.forEach(a=>{
    const sub=a.isLeslie?'20% CA HT + 1 000 EUR/mois (sauf aout) + 2% CA Sami & PA':'20% CA HT';
    body+=`<h2>${a.name} - ${sub}</h2>`;
    body+=`<table><thead><tr><th>Mois</th><th>CA HT</th><th>Frais port</th><th>Autres frais</th><th>Commission</th></tr></thead><tbody>`;
    let totCA=0,totComm=0;
    for(let m=1;m<=12;m++){
      const e=APP.data.facturation.find(f=>f.agent===a.id&&f.mois===m&&f.annee===year)||{caht:0,fraisPort:0,autresFrais:0};
      const caht=parseFloat(e.caht)||0;
      const fp=parseFloat(e.fraisPort)||0;
      const af=parseFloat(e.autresFrais)||0;
      let comm;
      if(a.isLeslie){
        const es=APP.data.facturation.find(f=>f.agent==='sami'&&f.mois===m&&f.annee===year)||{caht:0};
        const ep=APP.data.facturation.find(f=>f.agent==='pa'&&f.mois===m&&f.annee===year)||{caht:0};
        const fixe=m===8?0:1000;
        comm=(caht*0.20)+fixe+(parseFloat(es.caht)||0)*0.02+(parseFloat(ep.caht)||0)*0.02-fp-af;
      } else {
        comm=(caht*0.20)-fp-af;
      }
      totCA+=caht;totComm+=comm;
      const mLabel=moisLabels[m-1]+(a.isLeslie&&m===8?' (sans fixe)':'');
      body+=`<tr><td>${mLabel}</td><td>${caht.toFixed(2)}</td><td>${fp.toFixed(2)}</td><td>${af.toFixed(2)}</td><td>${comm.toFixed(2)}</td></tr>`;
    }
    body+=`<tr class="tot"><td>TOTAL ${year}</td><td>${totCA.toFixed(2)}</td><td colspan="2"></td><td>${totComm.toFixed(2)}</td></tr>`;
    body+='</tbody></table>';
  });
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Commissions ${year}</title>${css}</head><body>${body}</body></html>`);
  w.document.close();setTimeout(()=>{w.focus();w.print();},400);
}

</script>
